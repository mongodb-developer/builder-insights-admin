<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Builder Insights logo</title>
  <desc id="desc">MongoDB Builder Insights wordmark with abstract builder blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001E2B"/>
      <stop offset="100%" stop-color="#0B2A3A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ED64"/>
      <stop offset="100%" stop-color="#13AA52"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" rx="36" fill="url(#bg)"/>
  <g transform="translate(44 44)">
    <rect width="232" height="232" rx="32" fill="#08202D" stroke="#173B4A" stroke-width="2"/>
    <rect x="32" y="32" width="72" height="72" rx="16" fill="url(#accent)"/>
